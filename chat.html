<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>know3 Chat — Semantic RAG</title>
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@3/dist/transformers.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050911;
  --surface: rgba(12,16,28,0.85);
  --surface2: rgba(20,25,45,0.9);
  --border: rgba(40,50,80,0.5);
  --text: #e8eaf4;
  --text2: #8690b8;
  --text3: #505878;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.06);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Outfit', system-ui, sans-serif;
  --radius: 12px;
  --glass: blur(20px) saturate(1.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); overflow: hidden; position: relative; }
#matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8; }
.app { position: relative; z-index: 1; width: 100%; margin: 0; padding: 1rem; height: 100vh; display: flex; flex-direction: column; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; background: var(--surface); backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; gap: 1.2rem; }
.logo h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
.logo h1 .k { color: var(--accent); text-shadow: 0 0 20px rgba(0,229,160,0.3); }
.header-right { display: flex; gap: 0.5rem; align-items: center; }
.btn-icon { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 0.5rem 0.7rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.25s; }
.btn-icon:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.chat-container { display: flex; flex: 1; gap: 1rem; min-height: 0; }
.chat-main { flex: 1; display: flex; flex-direction: column; background: var(--surface); backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.chat-panel { flex: 0 0 300px; background: var(--surface); backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
#chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem; }
.msg { display: flex; gap: 0.6rem; animation: slideIn 0.3s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { justify-content: flex-end; }
.msg-bubble { max-width: 80%; padding: 0.8rem 1rem; border-radius: 10px; word-wrap: break-word; overflow-x: auto; }
.msg.user .msg-bubble { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--text); }
.msg.assistant .msg-bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3, .msg-bubble h4, .msg-bubble h5, .msg-bubble h6 { margin: 1rem 0 0.5rem 0; font-weight: 700; color: var(--accent); line-height: 1.4; }
.msg-bubble h1 { font-size: 1.3rem; }
.msg-bubble h2 { font-size: 1.15rem; }
.msg-bubble h3 { font-size: 1rem; }
.msg-bubble p { margin: 0.5rem 0; line-height: 1.6; }
.msg-bubble ul, .msg-bubble ol { margin: 0.5rem 0 0.5rem 1.5rem; line-height: 1.6; }
.msg-bubble li { margin: 0.2rem 0; }
.msg-bubble code { background: var(--surface2); border: 1px solid var(--border); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: var(--mono); font-size: 0.85rem; color: var(--accent); }
.msg-bubble pre { background: var(--surface2); border: 1px solid var(--border); padding: 0.8rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; font-size: 0.75rem; }
.msg-bubble pre code { background: none; border: none; padding: 0; color: var(--text2); font-family: var(--mono); }
.msg-bubble blockquote { border-left: 4px solid var(--accent); padding-left: 0.8rem; margin: 0.5rem 0; color: var(--text2); font-style: italic; }
.msg-bubble strong { color: var(--accent); font-weight: 600; }
.msg-bubble table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.8rem; }
.msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 0.4rem; text-align: left; }
.msg-bubble th { background: var(--surface2); color: var(--accent); font-weight: 600; }
.msg-bubble a { color: var(--accent); text-decoration: none; }
.msg-time { font-size: 0.7rem; color: var(--text3); align-self: flex-end; margin-right: 0.2rem; }
.msg-source { font-size: 0.75rem; color: var(--text2); margin-top: 0.4rem; padding-top: 0.4rem; border-top: 1px solid var(--border); }
.chat-input-box { padding: 1rem; border-top: 1px solid var(--border); display: flex; gap: 0.6rem; align-items: flex-end; }
#chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.7rem 0.9rem; border-radius: 8px; font-family: var(--sans); font-size: 0.9rem; resize: none; max-height: 100px; }
#chat-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.btn-send { background: var(--accent); border: none; color: var(--bg); padding: 0.7rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.25s; font-family: var(--sans); }
.btn-send:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,229,160,0.3); }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
.sidebar-tabs { display: flex; gap: 2px; padding: 0.5rem; border-bottom: 1px solid var(--border); }
.sidebar-tab { flex: 1; padding: 0.5rem; font-size: 0.75rem; font-weight: 600; text-align: center; background: transparent; border: 1px solid transparent; color: var(--text3); cursor: pointer; border-radius: 6px; transition: all 0.25s; }
.sidebar-tab:hover { background: var(--surface2); color: var(--text2); }
.sidebar-tab.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
.sidebar-content { flex: 1; overflow-y: auto; padding: 0.8rem; display: none; font-size: 0.75rem; }
.sidebar-content.active { display: block; }
.history-item { padding: 0.6rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: all 0.25s; margin-bottom: 0.5rem; }
.history-item:hover { background: rgba(0,229,160,0.1); border-color: var(--accent); }
.history-item.active { background: var(--accent-dim); border-color: var(--accent); }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; max-width: 95vw; width: 1000px; max-height: 95vh; overflow-y: auto; font-size: 0.9rem; display: flex; flex-direction: column; }
.modal-title { flex-shrink: 0; }
.modal-content > div:not(.modal-title):not(:last-child) { flex-shrink: 0; }
.modal-content .setting-group { flex-shrink: 0; }
body.modal-open { overflow: hidden; }
.modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent); }
.setting-group { margin-bottom: 1rem; }
.setting-label { font-weight: 600; font-size: 0.8rem; color: var(--accent); margin-bottom: 0.3rem; display: block; }
input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.6rem 0.8rem; border-radius: 6px; font-family: var(--mono); font-size: 0.85rem; margin-bottom: 0.5rem; min-height: 36px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.btn-small { background: var(--accent); border: none; color: var(--bg); padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.25s; font-family: var(--sans); width: 100%; margin-bottom: 0.3rem; }
.btn-small:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,229,160,0.2); }
.btn-small.secondary { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-small.secondary:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
.btn-small.danger { background: #f87171; }
.provider-info { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem; margin: 1rem 0; font-size: 0.75rem; color: var(--text2); }
.status-badge { display: inline-block; padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.7rem; margin-right: 0.4rem; }
.status-embedding { background: rgba(0,229,160,0.2); color: var(--accent); }
.status-loading { background: rgba(255,193,7,0.2); color: #ffc107; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
@media (max-width: 900px) { .chat-container { flex-direction: column; } .chat-panel { flex: 0 0 200px; max-height: 300px; } .msg-bubble { max-width: 100%; } }
</style>

<body>
<canvas id="matrix-canvas"></canvas>
<div class="app">

<script>
let embeddingModel = null;
let embeddingReady = false;

// Initialize embeddings model
async function initEmbeddings() {
  try {
    if (embeddingModel) return;
    updateEmbeddingStatus('⏳ Loading embedding model...');
    const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@3');
    embeddingModel = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
    embeddingReady = true;
    updateEmbeddingStatus('✅ Semantic');
  } catch (e) {
    console.warn('Embeddings unavailable:', e.message);
    updateEmbeddingStatus('⚠️ Keyword only');
    embeddingReady = false;
  }
}

function updateEmbeddingStatus(text) {
  const el = document.getElementById('embedding-status');
  if (el) el.textContent = text;
}

// Vector Store with semantic search
class VectorStore {
  constructor() {
    this.chunks = [];
    this.embeddings = [];
  }

  async addChunksFromJSON(data) {
    if (Array.isArray(data)) {
      data.forEach((item, i) => {
        this.chunks.push({ text: item.text || item.content || '', metadata: item.metadata || {index: i} });
      });
    } else if (data.chunks) {
      data.chunks.forEach((c, i) => {
        this.chunks.push({ text: c.text || '', metadata: {...c.metadata, collection: data.collection} });
      });
    }

    if (embeddingReady && this.chunks.length > 0) {
      await this.computeEmbeddings();
    }
  }

  async computeEmbeddings() {
    try {
      updateEmbeddingStatus('⏳ Computing embeddings...');
      this.embeddings = [];
      for (const chunk of this.chunks) {
        const emb = await embeddingModel(chunk.text, { pooling: 'mean', normalize: true });
        this.embeddings.push(Array.from(emb.data));
      }
      updateEmbeddingStatus(`✅ Semantic (${this.chunks.length} indexed)`);
    } catch (e) {
      console.warn('Embedding computation failed:', e.message);
      updateEmbeddingStatus('⚠️ Keyword only');
    }
  }

  cosineSimilarity(a, b) {
    if (!a || !b || a.length !== b.length) return 0;
    let dotProduct = 0, normA = 0, normB = 0;
    for (let i = 0; i < a.length; i++) {
      dotProduct += a[i] * b[i];
      normA += a[i] * a[i];
      normB += b[i] * b[i];
    }
    return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
  }

  keywordScore(query, text) {
    const terms = query.toLowerCase().split(/\s+/);
    const textLower = text.toLowerCase();
    let score = 0;
    terms.forEach(t => {
      const matches = (textLower.match(new RegExp(t, 'g')) || []).length;
      score += matches;
    });
    return score / Math.max(1, terms.length);
  }

  async search(query, topK = 3, mode = 'hybrid') {
    if (!this.chunks.length) return [];

    let results = [];

    if (mode === 'semantic' || mode === 'hybrid') {
      if (embeddingReady && this.embeddings.length > 0) {
        try {
          const queryEmb = await embeddingModel(query, { pooling: 'mean', normalize: true });
          const queryVec = Array.from(queryEmb.data);
          results = this.chunks.map((chunk, idx) => ({
            chunk,
            semScore: this.cosineSimilarity(queryVec, this.embeddings[idx])
          }));
        } catch (e) {
          console.warn('Query embedding failed:', e.message);
        }
      }
    }

    if (mode === 'keyword' || (mode === 'hybrid' && results.length === 0)) {
      results = this.chunks.map(chunk => ({
        chunk,
        keyScore: this.keywordScore(query, chunk.text)
      }));
    }

    // Hybrid scoring
    if (mode === 'hybrid') {
      results = results.map(r => ({
        chunk: r.chunk,
        score: (r.semScore || 0) * 0.7 + (r.keyScore || 0) * 0.3
      }));
    } else if (mode === 'semantic') {
      results = results.map(r => ({ chunk: r.chunk, score: r.semScore || 0 }));
    } else {
      results = results.map(r => ({ chunk: r.chunk, score: r.keyScore || 0 }));
    }

    return results.sort((a, b) => b.score - a.score).slice(0, topK).map(r => r.chunk);
  }

  clear() {
    this.chunks = [];
    this.embeddings = [];
  }
}

window.vectorStore = new VectorStore();

// Conversations
let conversations = {}, currentConversationId = null;

function initConversations() {
  try { conversations = JSON.parse(localStorage.getItem('know3_conversations')) || {}; } catch (e) { conversations = {}; }
  const id = localStorage.getItem('know3_current_id');
  if (id && conversations[id]) { currentConversationId = id; } else { startNewConversation(); }
  updateHistoryUI();
}

function startNewConversation() {
  const id = Date.now().toString();
  conversations[id] = { id, title: 'Chat ' + new Date().toLocaleString(), messages: [], created: Date.now() };
  currentConversationId = id;
  localStorage.setItem('know3_conversations', JSON.stringify(conversations));
  localStorage.setItem('know3_current_id', id);
  renderChat();
  updateHistoryUI();
  document.getElementById('chat-input').focus();
}

function renderMarkdown(text) {
  try {
    if (typeof marked === 'undefined') return escapeHtml(text);
    const html = marked.parse(text);
    if (typeof DOMPurify === 'undefined') return html;
    return DOMPurify.sanitize(html, {
      ALLOWED_TAGS: ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'br', 'strong', 'em', 'u', 'code', 'pre', 'blockquote', 'ul', 'ol', 'li', 'table', 'thead', 'tbody', 'tr', 'th', 'td', 'a', 'hr'],
      ALLOWED_ATTR: ['href', 'target']
    });
  } catch (e) {
    return escapeHtml(text);
  }
}

function renderChat() {
  const conv = conversations[currentConversationId];
  if (!conv) return;
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = conv.messages.map(m => `
    <div class="msg ${m.role}">
      <div class="msg-bubble">
        ${m.role === 'assistant' ? renderMarkdown(m.content) : escapeHtml(m.content)}
        ${m.sources ? `<div class="msg-source">📚 ${m.sources.map(s => escapeHtml(s.substring(0, 20))).join(', ')}</div>` : ''}
      </div>
      <div class="msg-time">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
    </div>
  `).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

function addMessage(role, content, sources = null) {
  const conv = conversations[currentConversationId];
  if (!conv) return;
  conv.messages.push({ role, content, sources, timestamp: Date.now() });
  if (role === 'user' && conv.messages.length === 1) {
    conv.title = content.substring(0, 50) + (content.length > 50 ? '...' : '');
  }
  localStorage.setItem('know3_conversations', JSON.stringify(conversations));
  renderChat();
  updateHistoryUI();
}

function updateHistoryUI() {
  const list = document.getElementById('history-list');
  list.innerHTML = Object.values(conversations).sort((a, b) => b.created - a.created)
    .map(c => `
      <div class="history-item ${c.id === currentConversationId ? 'active' : ''}" onclick="switchConversation('${c.id}')">
        <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text2); font-size: 0.75rem;">${escapeHtml(c.title.substring(0, 25))}</div>
        <div style="color: var(--text3); font-size: 0.7rem; margin-top: 0.2rem;">${new Date(c.created).toLocaleString()}</div>
      </div>
    `).join('');
}

function switchConversation(id) {
  if (conversations[id]) {
    currentConversationId = id;
    localStorage.setItem('know3_current_id', id);
    renderChat();
    updateHistoryUI();
  }
}

// Chat & Inference
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', q);

  const topK = parseInt(localStorage.getItem('know3_top_k')) || 3;
  const mode = document.getElementById('search-mode')?.value || 'hybrid';
  const results = await window.vectorStore.search(q, topK, mode);

  if (!results.length) {
    addMessage('assistant', '⚠️ No data loaded.');
    return;
  }

  const context = results.map(r => r.text).join('\n---\n');
  const sources = results.map(r => r.metadata?.source || 'Source').slice(0, 3);

  // Create empty bubble for streaming
  const conv = conversations[currentConversationId];
  conv.messages.push({ role: 'assistant', content: '', sources, timestamp: Date.now() });
  localStorage.setItem('know3_conversations', JSON.stringify(conversations));
  renderChat();
  currentStreamingIndex = conv.messages.length - 1;
  currentStreamingSources = sources;

  await queryInference(q, context);
}

async function queryInference(q, ctx) {
  const provider = localStorage.getItem('know3_provider') || 'ollama';
  const temp = (parseInt(localStorage.getItem('know3_temperature')) || 70) / 100;

  const prompt = `Based on the context below, answer the question concisely.

Context:
${ctx}

Question: ${q}

Answer:`;

  if (provider === 'ollama') {
  const url = localStorage.getItem('know3_ollama_url') || 'http://localhost:11434';
  const model = localStorage.getItem('know3_ollama_model') || 'mistral';
  try {
    const res = await fetch(`${url}/api/generate`, {
      method: 'POST',
      body: JSON.stringify({ model, prompt, temperature: temp, stream: true })
    });
    if (!res.ok) return `❌ Ollama unavailable`;
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      chunk.trim().split('\n').forEach(line => {
        try {
          const json = JSON.parse(line);
          if (json.response) fullText += json.response;
          updateStreamingMessage(fullText);
        } catch (e) {}
      });
    }
    return fullText;
    currentStreamingIndex = -1;
  } catch (e) {
    return `❌ Connection failed`;
  }
}

  if (provider === 'google') {
    const key = localStorage.getItem('know3_google_key');
    if (!key) return '🔑 Add API key in Settings > Google';
    const model = 'gemini-2.5-flash';
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: temp } })
      });
      if (!res.ok) return '❌ Google API error';
      return (await res.json()).candidates?.[0]?.content?.parts?.[0]?.text || 'No response';
    } catch (e) {
      return `❌ Error: ${e.message}`;
    }
  }

if (provider === 'groq') {
  const key = localStorage.getItem('know3_groq_key');
  if (!key) return '🔑 Add API key';
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: 'user', content: prompt }], temperature: temp, stream: true })
    });
    if (!res.ok) return '❌ Groq error';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      chunk.trim().split('\n').forEach(line => {
        if (line.startsWith('data: ')) {
          try {
            const json = JSON.parse(line.slice(6));
            const token = json.choices?.[0]?.delta?.content || '';
            if (token) {
              fullText += token;
              updateStreamingMessage(fullText);
            }
          } catch (e) {}
        }
      });
    }
    return fullText;
    currentStreamingIndex = -1;
  } catch (e) {
    return `❌ Error`;
  }
}

  if (provider === 'together') {
    const key = localStorage.getItem('know3_together_key');
    if (!key) return '🔑 Add API key in Settings > Together';
    try {
      const res = await fetch('https://api.together.xyz/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'meta-llama/Llama-3.3-70B-Instruct-Turbo', messages: [{ role: 'user', content: prompt }], temperature: temp })
      });
      if (!res.ok) return '❌ Together error';
      return (await res.json()).choices?.[0]?.message?.content || 'No response';
    } catch (e) {
      return `❌ Error: ${e.message}`;
    }
  }

  if (provider === 'github') {
    const key = localStorage.getItem('know3_github_key');
    if (!key) return '🔑 Add PAT in Settings > GitHub';
    try {
      const res = await fetch('https://models.inference.ai.azure.com/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'gpt-4o', messages: [{ role: 'user', content: prompt }], temperature: temp })
      });
      if (!res.ok) return '❌ GitHub Models error';
      return (await res.json()).choices?.[0]?.message?.content || 'No response';
    } catch (e) {
      return `❌ Error: ${e.message}`;
    }
  }

  if (provider === 'openrouter') {
    const key = localStorage.getItem('know3_openrouter_key');
    if (!key) return '🔑 Add key in Settings > OpenRouter';
    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json', 'HTTP-Referer': 'https://khalecl.github.io/know3' },
        body: JSON.stringify({ model: 'openrouter/auto', messages: [{ role: 'user', content: prompt }], temperature: temp })
      });
      if (!res.ok) return '❌ OpenRouter error';
      return (await res.json()).choices?.[0]?.message?.content || 'No response';
    } catch (e) {
      return `❌ Error: ${e.message}`;
    }
  }

  if (provider === 'mistral') {
    const key = localStorage.getItem('know3_mistral_key');
    if (!key) return '🔑 Add key in Settings > Mistral';
    try {
      const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'mistral-small-latest', messages: [{ role: 'user', content: prompt }], temperature: temp })
      });
      if (!res.ok) return '❌ Mistral error';
      return (await res.json()).choices?.[0]?.message?.content || 'No response';
    } catch (e) {
      return `❌ Error: ${e.message}`;
    }
  }

  if (provider === 'deepseek') {
    const key = localStorage.getItem('know3_deepseek_key');
    if (!key) return '🔑 Add key in Settings > DeepSeek';
    try {
      const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: prompt }], temperature: temp })
      });
      if (!res.ok) return '❌ DeepSeek error';
      return (await res.json()).choices?.[0]?.message?.content || 'No response';
    } catch (e) {
      return `❌ Error: ${e.message}`;
    }
  }

  if (provider === 'openai') {
    const key = localStorage.getItem('know3_openai_key');
    if (!key) return '🔑 Add key in Settings > OpenAI';
    try {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }], temperature: temp })
      });
      if (!res.ok) return '❌ OpenAI error';
      return (await res.json()).choices?.[0]?.message?.content || 'No response';
    } catch (e) {
      return `❌ Error: ${e.message}`;
    }
  }

  if (provider === 'anthropic') {
    const key = localStorage.getItem('know3_anthropic_key');
    if (!key) return '🔑 Add key in Settings > Anthropic';
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-3-5-haiku-latest', max_tokens: 1024, messages: [{ role: 'user', content: prompt }], temperature: temp })
      });
      if (!res.ok) return '❌ Anthropic error';
      return (await res.json()).content?.[0]?.text || 'No response';
    } catch (e) {
      return `❌ Error: ${e.message}`;
    }
  }

  currentStreamingIndex = -1;
  return 'Provider not configured.';
}

  function updateStreamingMessage(text) {
  if (currentStreamingIndex < 0) return;
  const conv = conversations[currentConversationId];
  if (!conv || !conv.messages[currentStreamingIndex]) return;
  
  conv.messages[currentStreamingIndex].content = text;
  localStorage.setItem('know3_conversations', JSON.stringify(conversations));
  
  const msgs = document.getElementById('chat-messages');
  const allMsgs = msgs.querySelectorAll('.msg');
  if (allMsgs.length > 0) {
    const lastBubble = allMsgs[allMsgs.length - 1].querySelector('.msg-bubble');
    if (lastBubble) {
      lastBubble.innerHTML = renderMarkdown(text) + (currentStreamingSources ? `<div class="msg-source">📚 ${currentStreamingSources.map(s => escapeHtml(s.substring(0, 20))).join(', ')}</div>` : '');
      msgs.scrollTop = msgs.scrollHeight;
    }
  }
}
// Data Loading
let selectedDataFile = null;

function switchLoadMethod(m) {
  document.getElementById('manual-load-section').style.display = m === 'manual' ? 'block' : 'none';
  document.getElementById('github-load-section').style.display = m === 'github' ? 'block' : 'none';
  if (m === 'github') loadGitHubDatasets();
}

function handleDataFileSelect(e) {
  selectedDataFile = e.target.files[0];
  if (selectedDataFile) {
    document.getElementById('file-preview').textContent = `📄 ${selectedDataFile.name} (${(selectedDataFile.size/1024).toFixed(1)}KB)`;
  }
}

async function loadDataFile() {
  if (!selectedDataFile) { alert('Select a file'); return; }
  const text = await selectedDataFile.text();
  try {
    let data;
    if (selectedDataFile.name.endsWith('.jsonl')) {
      data = text.trim().split('\n').map(l => JSON.parse(l));
    } else {
      data = JSON.parse(text);
    }
    await window.vectorStore.addChunksFromJSON(data);
    alert(`✅ Loaded ${window.vectorStore.chunks.length} chunks. Computing embeddings...`);
    updateSourcesUI();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function loadGitHubDatasets() {
  const select = document.getElementById('github-dataset-select');
  try {
    const res = await fetch('https://api.github.com/repos/khalecl/know3/contents/prelude');
    if (!res.ok) throw new Error('API unavailable');
    const files = await res.json();
    const datasets = files.filter(f => f.name.endsWith('.json') || f.name.endsWith('.jsonl'));
    select.innerHTML = datasets.map(f => `<option value="${f.download_url}">${f.name}</option>`).join('') || '<option value="https://khalecl.github.io/know3/prelude/oil.jsonl">oil.jsonl</option>';
  } catch (e) {
    select.innerHTML = '<option value="https://khalecl.github.io/know3/prelude/oil.jsonl">oil.jsonl</option>';
  }
}

async function loadGitHubDataset() {
  const url = document.getElementById('github-dataset-select').value;
  if (!url) { alert('Select'); return; }
  try {
    const res = await fetch(url);
    const text = await res.text();
    let data = url.endsWith('.jsonl') ? text.trim().split('\n').map(l => JSON.parse(l)) : JSON.parse(text);
    await window.vectorStore.addChunksFromJSON(data);
    alert(`✅ Loaded ${window.vectorStore.chunks.length} chunks. Computing embeddings...`);
    updateSourcesUI();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function updateSourcesUI() {
  const cols = {};
  window.vectorStore.chunks.forEach(c => {
    const col = c.metadata?.collection || 'Default';
    cols[col] = (cols[col] || 0) + 1;
  });
  document.getElementById('sources-list').innerHTML = Object.entries(cols).map(([n, c]) => `<div style="padding: 0.5rem; background: var(--surface2); border-radius: 6px; margin-bottom: 0.4rem;"><div style="color: var(--accent); font-weight: 600;">📁 ${escapeHtml(n)}</div><div style="color: var(--text3);">${c} chunks ${embeddingReady ? '📊' : ''}</div></div>`).join('') || '<div style="color: var(--text3);">Upload JSON</div>';
}

// Settings
function updateProviderUI() {
  const p = document.getElementById('provider-select').value;
  document.querySelectorAll('.provider-config').forEach(e => e.style.display = 'none');
  const c = document.getElementById(`${p}-config`);
  if (c) c.style.display = 'block';
}

function saveSettings() {
  localStorage.setItem('know3_provider', document.getElementById('provider-select').value);
  localStorage.setItem('know3_temperature', document.getElementById('setting-temperature').value);
  localStorage.setItem('know3_top_k', document.getElementById('setting-top-k').value);
  localStorage.setItem('know3_search_mode', document.getElementById('search-mode').value);

  const p = document.getElementById('provider-select').value;
  const providers = ['ollama', 'google', 'groq', 'together', 'github', 'openrouter', 'mistral', 'deepseek', 'openai', 'anthropic'];
  providers.forEach(prov => {
    const keyEl = document.getElementById(`setting-${prov}-key`);
    if (keyEl) localStorage.setItem(`know3_${prov}_key`, keyEl.value);
    const urlEl = document.getElementById(`setting-${prov}-url`);
    if (urlEl) localStorage.setItem(`know3_${prov}_url`, urlEl.value);
    const modelEl = document.getElementById(`setting-${prov}-model`);
    if (modelEl) localStorage.setItem(`know3_${prov}_model`, modelEl.value);
  });

  alert('✅ Settings saved');
}

function exportCurrentChat() {
  const c = conversations[currentConversationId];
  if (!c) return;
  const blob = new Blob([JSON.stringify(c, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `chat_${Date.now()}.json`;
  a.click();
}

function clearAllData() {
  if (confirm('⚠️ Delete ALL?')) {
    conversations = {};
    window.vectorStore.clear();
    localStorage.clear();
    startNewConversation();
    updateSourcesUI();
    alert('Cleared');
  }
}

function updateTempDisplay() {
  const val = parseInt(document.getElementById('setting-temperature').value);
  document.getElementById('temp-number').textContent = (val / 100).toFixed(2);
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;

}

  const m = document.getElementById(id);
  if (m) {
    m.classList.add('active');
    document.body.classList.add('modal-open');

}

function closeModal(id) {

// Matrix
let currentStreamingIndex = -1;
let currentStreamingSources = null;
  
  class MatrixRain {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.chars = 'アィゥェォカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン0123456789';
    this.fontSize = 14;
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.animate();
  }
  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.cols = Math.floor(this.canvas.width / this.fontSize);
    this.drops = new Array(this.cols).fill(1);
  }
  draw() {
    this.ctx.fillStyle = 'rgba(0,0,0,0.05)';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.font = `${this.fontSize}px monospace`;
    this.ctx.fillStyle = `rgba(0,229,160,${0.4 + Math.random() * 0.6})`;
    for (let i = 0; i < this.cols; i++) {
      this.ctx.fillText(this.chars[Math.floor(Math.random() * this.chars.length)], i * this.fontSize, this.drops[i] * this.fontSize);
      if (this.drops[i] * this.fontSize > this.canvas.height && Math.random() > 0.975) this.drops[i] = 0;
      this.drops[i]++;
    }
  }
  animate() {
    this.draw();
    requestAnimationFrame(() => this.animate());
  }
}

// Init
window.addEventListener('DOMContentLoaded', () => {
  new MatrixRain(document.getElementById('matrix-canvas'));

  const chatInput = document.getElementById('chat-input');
  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  const provider = localStorage.getItem('know3_provider') || 'ollama';
  const temp = parseInt(localStorage.getItem('know3_temperature')) || 70;

  document.getElementById('provider-select').value = provider;
  document.getElementById('setting-temperature').value = temp;
  document.getElementById('temp-number').textContent = (temp / 100).toFixed(2);
  document.getElementById('search-mode').value = mode;

  updateProviderUI();
  initConversations();
  updateSourcesUI();
  initEmbeddings();
});
