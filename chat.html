<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>know3 Chat — Multi-Provider RAG Interface</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #050911;
  --surface: rgba(12,16,28,0.85);
  --surface2: rgba(20,25,45,0.9);
  --border: rgba(40,50,80,0.5);
  --text: #e8eaf4;
  --text2: #8690b8;
  --text3: #505878;
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.06);
  --accent-glow: rgba(0,229,160,0.12);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Outfit', system-ui, sans-serif;
  --radius: 12px;
  --glass: blur(20px) saturate(1.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  position: relative;
}

#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0.8;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 1rem 1.5rem;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 1rem;
  background: var(--surface);
  backdrop-filter: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1rem;
  gap: 1.2rem;
}

.logo h1 {
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin: 0;
}

.logo h1 .k { color: var(--accent); text-shadow: 0 0 20px rgba(0,229,160,0.3); }

.header-right {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}

.btn-icon {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 0.5rem 0.7rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.25s;
}

.btn-icon:hover {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

.chat-container {
  display: flex;
  flex: 1;
  gap: 1rem;
  min-height: 0;
}

.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  backdrop-filter: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.chat-panel {
  flex: 0 0 300px;
  background: var(--surface);
  backdrop-filter: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.msg {
  display: flex;
  gap: 0.6rem;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { justify-content: flex-end; }

.msg-bubble {
  max-width: 80%;
  padding: 0.8rem 1rem;
  border-radius: 10px;
  word-wrap: break-word;
}

.msg.user .msg-bubble {
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  color: var(--text);
}

.msg.assistant .msg-bubble {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
}

.msg-time {
  font-size: 0.7rem;
  color: var(--text3);
  align-self: flex-end;
  margin-right: 0.2rem;
}

.msg-source {
  font-size: 0.75rem;
  color: var(--text2);
  margin-top: 0.4rem;
  padding-top: 0.4rem;
  border-top: 1px solid var(--border);
}

.chat-input-box {
  padding: 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.6rem;
  align-items: flex-end;
}

#chat-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.7rem 0.9rem;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 0.9rem;
  resize: none;
  max-height: 100px;
}

#chat-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}

.btn-send {
  background: var(--accent);
  border: none;
  color: var(--bg);
  padding: 0.7rem 1rem;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.25s;
  font-family: var(--sans);
}

.btn-send:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,229,160,0.3);
}

.btn-send:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.sidebar-tabs {
  display: flex;
  gap: 2px;
  padding: 0.5rem;
  border-bottom: 1px solid var(--border);
}

.sidebar-tab {
  flex: 1;
  padding: 0.5rem;
  font-size: 0.75rem;
  font-weight: 600;
  text-align: center;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text3);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.25s;
}

.sidebar-tab:hover {
  background: var(--surface2);
  color: var(--text2);
}

.sidebar-tab.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--accent);
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 0.8rem;
  display: none;
}

.sidebar-content.active { display: block; }

.history-item {
  padding: 0.6rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.25s;
  margin-bottom: 0.5rem;
}

.history-item:hover {
  background: rgba(0,229,160,0.1);
  border-color: var(--accent);
}

.history-item.active {
  background: var(--accent-dim);
  border-color: var(--accent);
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active { display: flex; }

.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  max-width: 600px;
  width: 90%;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-title {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 1rem;
  color: var(--accent);
}

.setting-group {
  margin-bottom: 1rem;
}

.setting-label {
  font-weight: 600;
  font-size: 0.8rem;
  color: var(--accent);
  margin-bottom: 0.3rem;
  display: block;
}

input, select, textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.5rem;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 0.8rem;
  margin-bottom: 0.4rem;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}

.btn-small {
  background: var(--accent);
  border: none;
  color: var(--bg);
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  font-family: var(--sans);
  width: 100%;
  margin-bottom: 0.3rem;
}

.btn-small:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,229,160,0.2);
}

.btn-small.secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
}

.btn-small.secondary:hover {
  background: var(--surface2);
  border-color: var(--accent);
  color: var(--accent);
}

.btn-small.danger {
  background: #f87171;
}

.provider-info {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.8rem;
  margin: 1rem 0;
  font-size: 0.75rem;
  color: var(--text2);
}

.provider-info a {
  color: var(--accent);
  text-decoration: none;
  margin-right: 0.8rem;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

@media (max-width: 900px) {
  .chat-container { flex-direction: column; }
  .chat-panel { flex: 0 0 200px; max-height: 300px; }
  .msg-bubble { max-width: 100%; }
}
</style>

<script>
// ════════════════════════════════════════════════════════════════════════════
// VECTOR STORE
// ════════════════════════════════════════════════════════════════════════════

class VectorStore {
  constructor() {
    this.chunks = [];
  }

  addChunksFromJSON(data) {
    if (Array.isArray(data)) {
      data.forEach((item, i) => {
        this.chunks.push({ text: item.text || item.content || '', metadata: item.metadata || {index: i} });
      });
    } else if (data.chunks) {
      data.chunks.forEach((c, i) => {
        this.chunks.push({ text: c.text || '', metadata: {...c.metadata, collection: data.collection} });
      });
    }
  }

  search(query, topK = 3) {
    if (!this.chunks.length) return [];
    const terms = query.toLowerCase().split(/\s+/);
    const scored = this.chunks.map((c, i) => {
      let score = 0;
      terms.forEach(t => score += (c.text.toLowerCase().match(new RegExp(t, 'g')) || []).length);
      return { chunk: c, score, i };
    });
    return scored.sort((a, b) => b.score - a.score).slice(0, topK).map(x => x.chunk);
  }

  clear() { this.chunks = []; }
}

window.vectorStore = new VectorStore();

let conversations = {}, currentConversationId = null;

function initConversations() {
  try {
    conversations = JSON.parse(localStorage.getItem('know3_conversations')) || {};
  } catch (e) {
    conversations = {};
  }
  const id = localStorage.getItem('know3_current_id');
  if (id && conversations[id]) {
    currentConversationId = id;
  } else {
    startNewConversation();
  }
  updateHistoryUI();
}

function startNewConversation() {
  const id = Date.now().toString();
  conversations[id] = { id, title: 'Chat ' + new Date().toLocaleString(), messages: [], created: Date.now() };
  currentConversationId = id;
  localStorage.setItem('know3_conversations', JSON.stringify(conversations));
  localStorage.setItem('know3_current_id', id);
  renderChat();
  updateHistoryUI();
  document.getElementById('chat-input').focus();
}

function renderChat() {
  const conv = conversations[currentConversationId];
  if (!conv) return;
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = conv.messages.map(m => `
    <div class="msg ${m.role}">
      <div class="msg-bubble">
        ${escapeHtml(m.content)}
        ${m.sources ? `<div class="msg-source">📚 ${m.sources.map(s => escapeHtml(s.substring(0, 20))).join(', ')}</div>` : ''}
      </div>
      <div class="msg-time">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
    </div>
  `).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

function addMessage(role, content, sources = null) {
  const conv = conversations[currentConversationId];
  if (!conv) return;
  conv.messages.push({ role, content, sources, timestamp: Date.now() });
  if (role === 'user' && conv.messages.length === 1) {
    conv.title = content.substring(0, 50) + (content.length > 50 ? '...' : '');
  }
  localStorage.setItem('know3_conversations', JSON.stringify(conversations));
  renderChat();
  updateHistoryUI();
}

function updateHistoryUI() {
  const list = document.getElementById('history-list');
  list.innerHTML = Object.values(conversations).sort((a, b) => b.created - a.created)
    .map(c => `
      <div class="history-item ${c.id === currentConversationId ? 'active' : ''}" onclick="switchConversation('${c.id}')">
        <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text2); font-size: 0.75rem;">${escapeHtml(c.title.substring(0, 25))}</div>
        <div style="color: var(--text3); font-size: 0.7rem; margin-top: 0.2rem;">${new Date(c.created).toLocaleString()}</div>
      </div>
    `).join('');
}

function switchConversation(id) {
  if (conversations[id]) {
    currentConversationId = id;
    localStorage.setItem('know3_current_id', id);
    renderChat();
    updateHistoryUI();
  }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', q);

  const settings = loadSettings();
  const topK = parseInt(localStorage.getItem('know3_top_k')) || 3;
  const results = window.vectorStore.search(q, topK);

  if (!results.length) {
    addMessage('assistant', '⚠️ No data loaded. Upload JSON to enable RAG search.');
    return;
  }

  const context = results.map(r => r.text).join('\n---\n');
  const sources = results.map(r => r.metadata?.source || r.metadata?.file || 'Source').slice(0, 3);

  const answer = await queryInference(q, context, settings);
  addMessage('assistant', answer, sources);
}

async function queryInference(query, context, settings) {
  const provider = localStorage.getItem('know3_provider') || 'ollama';
  const temp = (parseInt(localStorage.getItem('know3_temperature')) || 70) / 100;

  switch(provider) {
    case 'google':
      return await queryGoogle(query, context, temp);
    case 'groq':
      return await queryGroq(query, context, temp);
    case 'together':
      return await queryTogether(query, context, temp);
    case 'github':
      return await queryGitHub(query, context, temp);
    case 'openrouter':
      return await queryOpenRouter(query, context, temp);
    case 'mistral':
      return await queryMistral(query, context, temp);
    case 'deepseek':
      return await queryDeepSeek(query, context, temp);
    case 'openai':
      return await queryOpenAI(query, context, temp);
    case 'anthropic':
      return await queryAnthropic(query, context, temp);
    default:
      return await queryOllama(query, context, temp);
  }
}

async function queryOllama(q, ctx, temp) {
  const url = localStorage.getItem('know3_ollama_url') || 'http://localhost:11434';
  const model = localStorage.getItem('know3_ollama_model') || 'mistral';
  try {
    const res = await fetch(`${url}/api/generate`, {
      method: 'POST',
      body: JSON.stringify({ model, prompt: `Context:\n${ctx}\n\nQ: ${q}\n\nA:`, temperature: temp, stream: false })
    });
    if (!res.ok) return `❌ Ollama error (${res.status})`;
    return (await res.json()).response || 'No response';
  } catch (e) {
    return `❌ Connection failed: ${e.message}`;
  }
}

  selectedDataFile = e.target.files[0];

    document.getElementById('file-preview').textContent = `📄 ${selectedDataFile.name} (${(selectedDataFile.size/1024).toFixed(1)}KB)`;
  }

async function loadDataFile() {
  if (!selectedDataFile) { alert('Select a file'); return; }
  const text = await selectedDataFile.text();
  try {
    let data;
    if (selectedDataFile.name.endsWith('.jsonl')) {
      data = text.trim().split('\n').map(l => JSON.parse(l));
    } else {
      data = JSON.parse(text);
    }
    window.vectorStore.addChunksFromJSON(data);
    alert(`✅ Loaded ${window.vectorStore.chunks.length} chunks`);
    updateSourcesUI();
    closeModal('load-data-modal');
  } catch (e) {
    alert('Parse error: ' + e.message);

class MatrixRain {
  constructor(canvas, color = '#00ff00') {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.color = color;
    this.intensity = 0.8;
    this.chars = 'アィゥェォカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    this.fontSize = 14;
    this.enabled = true;
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.animate();
  }

  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.cols = Math.floor(this.canvas.width / this.fontSize);
    this.drops = new Array(this.cols).fill(1);
  }

  hexToRgb(hex) {
    const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? { r: parseInt(r[1], 16), g: parseInt(r[2], 16), b: parseInt(r[3], 16) } : { r: 0, g: 255, b: 0 };
  }

  getColor() {
    const rgb = this.hexToRgb(this.color);
    const i = 0.4 + Math.random() * 0.6 * this.intensity;
    return `rgba(${Math.floor(rgb.r*(1-i*0.3))},${Math.floor(rgb.g*(0.6+i*0.4))},${Math.floor(rgb.b*(1-i*0.2))},${0.7+i*0.3})`;
  }

  draw() {
    this.ctx.fillStyle = 'rgba(0,0,0,0.05)';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.font = `${this.fontSize}px monospace`;
    for (let i = 0; i < this.drops.length; i++) {
      this.ctx.fillStyle = this.getColor();
      this.ctx.fillText(this.chars[Math.floor(Math.random() * this.chars.length)], i * this.fontSize, this.drops[i] * this.fontSize);
      if (this.drops[i] * this.fontSize > this.canvas.height && Math.random() > 0.975) this.drops[i] = 0;
      this.drops[i]++;
    }
  }

  animate() {
    if (this.enabled) this.draw();
    requestAnimationFrame(() => this.animate());
  }

  setColor(hex) { this.color = hex; }
  setIntensity(v) { this.intensity = Math.max(0, Math.min(1, v/100)); }
  setEnabled(e) { this.enabled = e; }
}

let matrixRain = null;

function toggleMatrixBg() {
  const e = document.getElementById('matrix-enabled')?.checked;
  if (matrixRain) matrixRain.setEnabled(e);
}

function updateMatrixColor() {
  const c = document.getElementById('matrix-color')?.value || '#00ff00';
  if (matrixRain) matrixRain.setColor(c);
}

function updateMatrixIntensity() {
  const i = parseInt(document.getElementById('matrix-intensity')?.value) || 80;
  if (matrixRain) matrixRain.setIntensity(i);
}

// ════════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('matrix-canvas');
  const matrixColor = localStorage.getItem('know3_matrix_color') || '#00ff00';
  const matrixIntensity = parseInt(localStorage.getItem('know3_matrix_intensity')) || 80;
  const matrixEnabled = localStorage.getItem('know3_matrix_enabled') !== 'false';

  matrixRain = new MatrixRain(canvas, matrixColor);
  matrixRain.setIntensity(matrixIntensity);
  matrixRain.setEnabled(matrixEnabled);

  const matrixColorInput = document.getElementById('matrix-color');
  if (matrixColorInput) matrixColorInput.value = matrixColor;

  const matrixEnabledInput = document.getElementById('matrix-enabled');
  if (matrixEnabledInput) matrixEnabledInput.checked = matrixEnabled;

  const matrixIntensityInput = document.getElementById('matrix-intensity');
  if (matrixIntensityInput) matrixIntensityInput.value = matrixIntensity;

  const chatInput = document.getElementById('chat-input');
  if (chatInput) {
    chatInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  }

  const settings = loadSettings();
  const providerSelect = document.getElementById('provider-select');
  if (providerSelect) providerSelect.value = settings.provider;

  const tempSlider = document.getElementById('setting-temperature');
  if (tempSlider) {
    tempSlider.value = settings.temperature;
    updateTempDisplay();
  }

  const topK = document.getElementById('setting-top-k');
  if (topK) topK.value = settings.topK;

  const quickProvider = document.getElementById('quick-provider');
  if (quickProvider) quickProvider.value = settings.provider;

  const tempDisplay = document.getElementById('temp-slider');
  if (tempDisplay) {
    tempDisplay.value = settings.temperature;
    updateTemp();
  }

  updateProviderUI();
  initConversations();
  updateSourcesUI();
});

window.openModal = openModal;
window.closeModal = closeModal;
window.switchSidebarTab = switchSidebarTab;
window.sendMessage = sendMessage;
window.switchLoadMethod = switchLoadMethod;
window.handleDataFileSelect = handleDataFileSelect;
window.loadDataFile = loadDataFile;
window.loadGitHubDatasets = loadGitHubDatasets;
window.loadGitHubDataset = loadGitHubDataset;
window.startNewConversation = startNewConversation;
window.switchConversation = switchConversation;
window.updateProviderUI = updateProviderUI;
window.saveSettings = saveSettings;
window.switchProvider = switchProvider;
window.updateTemp = updateTemp;
window.exportCurrentChat = exportCurrentChat;
window.clearAllData = clearAllData;
window.toggleMatrixBg = toggleMatrixBg;
window.updateMatrixColor = updateMatrixColor;
window.updateMatrixIntensity = updateMatrixIntensity;
</script>
