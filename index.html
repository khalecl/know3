<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Protected Project</title>
</head>
<body>

  <!-- Your app content goes inside a container matching APP_SELECTOR -->
  <div class="app">
    <h1>My Project</h1>
    <p>This is the main app content.</p>
  </div>

  <!-- 
    ═══════════════════════════════════════════════════════════════
    OPTION A: Inline (hardcoded directly in the HTML)
    Best for single-file apps where you don't want external deps
    ═══════════════════════════════════════════════════════════════
  -->
  <script>
    // ── CUSTOMIZE THESE 6 VALUES FOR EACH PROJECT ──
    const HOSTING_CONFIG = {
      ALLOWED_HOSTNAME: 'khalecl.github.io',
      OFFICIAL_URL: 'https://khalecl.github.io/my-project/index.html',
      PROJECT_NAME: 'My Project',
      AUTHOR_NAME: 'Dr. Khaled Diab',
      GITHUB_REPO: 'https://github.com/khalecl/my-project',
      APP_SELECTOR: '.app',
    };

    function checkHosting() {
      const hostname = window.location.hostname;
      const protocol = window.location.protocol;
      const isGitHub = hostname === HOSTING_CONFIG.ALLOWED_HOSTNAME;
      const isLocalDev = hostname === 'localhost' || hostname === '127.0.0.1' || hostname.endsWith('.localhost');
      const isFile = protocol === 'file:';
      if (isGitHub || isLocalDev) return;
      if (isFile) { showHostingBlock('file'); return; }
      showHostingBlock('unofficial');
    }

    function showHostingBlock(type) {
      const cfg = HOSTING_CONFIG;
      const app = document.querySelector(cfg.APP_SELECTOR);
      if (app) { app.style.filter='blur(6px) grayscale(0.5)'; app.style.pointerEvents='none'; app.style.userSelect='none'; }
      const overlay = document.createElement('div');
      overlay.id = 'hosting-block';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(5,9,17,0.92);backdrop-filter:blur(12px);font-family:system-ui,sans-serif;';
      const icon = type === 'file' ? '🔒' : '⚠️';
      const title = type === 'file' ? `${cfg.PROJECT_NAME} Runs on GitHub Pages` : 'Unofficial Copy Detected';
      const msg = type === 'file'
        ? 'This application is designed to run from its official hosted location.<br>Your data stays 100% local — only the UI loads from GitHub.'
        : `This appears to be an unauthorized copy of ${cfg.PROJECT_NAME}.<br>Please use the official version.`;
      const btn = type === 'file' ? `🚀 Open Official ${cfg.PROJECT_NAME}` : `🚀 Go to Official ${cfg.PROJECT_NAME}`;
      overlay.innerHTML = `<div style="text-align:center;max-width:480px;padding:2rem;"><div style="font-size:3rem;margin-bottom:1rem;">${icon}</div><h2 style="color:#e8eaf4;font-size:1.4rem;margin-bottom:.8rem;">${title}</h2><p style="color:#8690b8;line-height:1.7;margin-bottom:1.5rem;font-size:.92rem;">${msg}</p><a href="${cfg.OFFICIAL_URL}" style="display:inline-block;padding:.7rem 2rem;background:linear-gradient(135deg,#00e5a0,#00c78a);color:#050810;border-radius:8px;text-decoration:none;font-weight:700;font-size:.9rem;box-shadow:0 4px 20px rgba(0,229,160,0.3);">${btn}</a><p style="color:#505878;font-size:.75rem;margin-top:1.2rem;">Created by ${cfg.AUTHOR_NAME} · <a href="${cfg.GITHUB_REPO}" target="_blank" style="color:#505878;">${cfg.GITHUB_REPO.replace('https://','')}</a></p></div>`;
      document.body.appendChild(overlay);
    }

    document.addEventListener('DOMContentLoaded', checkHosting);
  </script>

  <!-- 
    ═══════════════════════════════════════════════════════════════
    OPTION B: External script (cleaner for multi-page sites)
    Put github-hosting-protection.js in your repo, edit the
    HOSTING_CONFIG at the top, then add this one line:
    ═══════════════════════════════════════════════════════════════
    
    <script src="github-hosting-protection.js"></script>
  -->

</body>
</html>
